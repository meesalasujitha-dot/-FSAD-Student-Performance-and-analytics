services:
  - type: web
    name: performancepulse-backend
    env: docker
    rootDir: backend
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  - type: web
    name: performancepulse-frontend
    env: static
    rootDir: FSAD-PS29-student-performance-analytics
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: performancepulse-backend
          envVarKey: RENDER_EXTERNAL_URL
